name: replicate_interceptor
description: >
  Flutter interceptor package for the Replicate iOS Simulator developer tool
version: 0.1.0
homepage: https://github.com/replicate/replicate_interceptor

environment:
  sdk: ^3.9.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  # UUID generation for network event IDs
  uuid: ^4.4.0
  # package:http interceptor support
  http: ^1.2.0
  # Dio interceptor support
  dio: ^5.7.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
